name: Mock AI Review

on:
  pull_request:
    types: [opened, ready_for_review, review_requested, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write   # needed to remove the ai-review label after triggering

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request' && (
        github.event.action == 'opened' ||
        github.event.action == 'ready_for_review' ||
        (github.event.action == 'labeled' &&
         github.event.label.name == 'ai-review') ||
        (github.event.action == 'review_requested' &&
         ((github.event.requested_team != null &&
           github.event.requested_team.slug == 'ai-review-bot') ||
          (github.event.requested_reviewer != null &&
           github.event.requested_reviewer.login == 'DummyAaron')))
      )) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@DummyAaron'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number (handle issue_comment event shape)
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve PR head SHA
        id: prhead
        env:
          GH_TOKEN: ${{ secrets.AI_REVIEW_SVC_PAT }}
        run: |
          HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}" --jq .head.sha)
          echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Auto-remove ai-review label (only on label trigger)
        if: github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'ai-review'
        env:
          GH_TOKEN: ${{ secrets.AI_REVIEW_SVC_PAT }}
        run: |
          gh api -X DELETE \
            "repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/labels/ai-review" \
            || echo "Label removal failed (already removed or transient); continuing."

      - name: Add ai-review-bot as reviewer (only on first events, idempotent)
        if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'ready_for_review')
        env:
          GH_TOKEN: ${{ secrets.AI_REVIEW_SVC_PAT }}
        run: |
          gh api -X POST \
            "repos/${{ github.repository }}/pulls/${{ steps.pr.outputs.number }}/requested_reviewers" \
            -F "team_reviewers[]=ai-review-bot" \
            || echo "Add team reviewer failed (already requested or transient); continuing."

      - name: Post hardcoded mock review
        env:
          GH_TOKEN: ${{ secrets.AI_REVIEW_SVC_PAT }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.prhead.outputs.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Identify which trigger path fired this run
          TRIGGER_LABEL=""
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            TRIGGER_LABEL="@mention by \`${{ github.event.comment.user.login }}\`"
          elif [ "${{ github.event.action }}" = "labeled" ]; then
            TRIGGER_LABEL="\`ai-review\` label added by \`${{ github.actor }}\`"
          elif [ "${{ github.event.action }}" = "review_requested" ]; then
            if [ -n "${{ github.event.requested_team.slug }}" ]; then
              TRIGGER_LABEL="team \`${{ github.event.requested_team.slug }}\` requested by \`${{ github.actor }}\`"
            else
              TRIGGER_LABEL="user \`${{ github.event.requested_reviewer.login }}\` requested by \`${{ github.actor }}\`"
            fi
          else
            TRIGGER_LABEL="\`${{ github.event.action }}\` by \`${{ github.actor }}\`"
          fi

          BODY=$(cat <<EOF
          **Mock AI Review — fired**

          - Trigger path: $TRIGGER_LABEL
          - Workflow run: [#${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})
          - Head SHA: \`${HEAD_SHA}\`
          - Fired at: \`${TIMESTAMP}\` UTC

          This is a HARDCODED review comment. No LLM was called.
          Submitted by service account \`DummyAaron\`.

          **Re-trigger options:**
          1. Click "Re-request review" next to \`DummyAaron\` in the Reviewers sidebar
          2. Add the \`ai-review\` label to this PR (label auto-removes after triggering)
          3. Comment in this PR with \`@DummyAaron\` somewhere in the body
          EOF
          )

          jq -nc --arg body "$BODY" --arg sha "$HEAD_SHA" \
            '{event: "COMMENT", body: $body, commit_id: $sha}' \
            | gh api -X POST \
                "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
                --input -
